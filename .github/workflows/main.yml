name: Manual Selenium CIon: workflow_dispatch: # Runs ONLY when manually triggered from the Actions tabjobs: test: runs-on: ubuntu-latest timeout-minutes: 20 steps: # --------------------------- # 1. Checkout Code # --------------------------- - name: Checkout repository uses: actions/checkout@v4 # --------------------------- # 2. Setup JDK 17 # --------------------------- - name: Setup Java 17 uses: actions/setup-java@v4 with: java-version: "17" distribution: "temurin" cache: maven # --------------------------- # 3. Install Latest Google Chrome # --------------------------- - name: Install Google Chrome run: | sudo apt update sudo apt install -y wget gnupg wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list sudo apt update sudo apt install -y google-chrome-stable google-chrome --version # --------------------------- # 4. Run Selenium Tests # WebDriverManager auto-installs chromedriver # --------------------------- - name: Run TestNG Selenium Tests env: GITHUB_ACTIONS: true # enables headless mode in your code run: | mvn -B clean test # --------------------------- # 5. Upload TestNG Reports # --------------------------- - name: Upload Test Reports uses: actions/upload-artifact@v4 if: always() with: name: TestNG-Reports path: target/surefire-reports/ # --------------------------- # 6. Upload Screenshots (optional) # --------------------------- - name: Upload Screenshots uses: actions/upload-artifact@v4 if: always() with: name: Screenshots path: screenshots/ # --------------------------- # 7. Upload Logs (optional) # --------------------------- - name: Upload Logs uses: actions/upload-artifact@v4 if: always() with: name: Logs path: logs/
